# fly.toml app configuration file generated for my-travel-app on 2026-06-02T21:57:06+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'my-travel-app'
primary_region = 'ams'

[build]

[env]
  PORT = '3000'
  DATABASE_URL = 'file:///data/sqlite.db'
  NEXT_PUBLIC_GOOGLE_MAPS_API_KEY = 'AIzaSyARb_8RJodpsWpXB_tTXSmo7xfkC1d27do'

[[mounts]]
  source = 'voyami_data'
  destination = '/data'
  initial_size = '3GB'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
